name: abi pipeline

on: push

jobs:
  build-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Java version
        run: java -version

      - name: List files
        run: ls

      - name: Compile Java program
        run: javac Hello.java

      - name: Run Java program
        run: java Hello
